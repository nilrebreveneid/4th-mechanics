<body>

<div class="bg-base"></div>
<div class="bg-grid"></div>

<header class="header">
  <div class="h-top">
    <div class="header-slot" aria-hidden="true"></div>
    <div class="h-actions">
      <div class="pill" id="timerPill"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;color:var(--text-muted)"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 7.5v5l3 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span id="timerDisplay">00:00</span></div>
      <div class="pill" id="marksPill"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;color:var(--text-muted)"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg><span id="marksNum">0</span></div>
      <button class="hbtn" id="themeToggle" aria-label="Toggle theme">
        <svg id="iconSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="iconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</header>

<div class="topic-banner-wrap">
  <div class="topic-banner">
    <div class="topic-main">
      <div class="topic-title" id="topicName">Topic</div>
    </div>
  </div>
</div>

<div id="ctrlBar" class="ctrl-bar" style="max-width:680px;margin:0 auto;width:100%;">
  <div class="ctrl-left">
    <button class="ctrl-utility" id="shuffleBtn" onclick="shuffleAndReset()" aria-label="Shuffle quiz questions">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/>
        <path d="m18 2 4 4-4 4"/>
        <path d="M2 6h1.9c1.5 0 2.9.9 3.5 2.2"/>
        <path d="M22 18h-5.9c-1.3 0-2.5-.7-3.1-1.8l-.3-.5"/>
        <path d="m18 14 4 4-4 4"/>
      </svg>
      <span>Shuffle</span>
    </button>
    <button class="ctrl-utility" id="readingBtn" onclick="activateReadingMode()" aria-label="Start reading mode">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v18H6.5A2.5 2.5 0 0 1 4 17.5v-13A2.5 2.5 0 0 1 6.5 2Z"/>
      </svg>
      <span>Reading</span>
    </button>
  </div>
  <div class="ctrl-tools">
    <div class="mode-row" id="modeRow">
      <div class="mode-slider" id="modeSlider"></div>
      <button class="mbtn active" data-mode="practice" onclick="setMode('practice')" id="practiceBtn">Practice</button>
      <button class="mbtn" data-mode="exam" onclick="setMode('exam')" id="examBtn">Exam</button>
    </div>
  </div>
</div>

<div id="examBannerWrap" style="display:none;max-width:680px;margin:0 auto;width:100%;padding:0 18px">
  <div class="exam-banner" id="examBanner">
    <div><div class="eb-count" id="ebCount">0</div><div class="eb-lbl">Answered of <span id="ebTotal">12</span></div></div>
    <button class="eb-submit" onclick="submitExam()">Submit Exam</button>
  </div>
</div>

<main class="main" id="mainContainer">

  <!-- SCENE GLOWS -->
  <div class="sc-scene-glow" id="scSceneGlow"><div class="sc-glow-1" id="scGlow1"></div><div class="sc-glow-2"></div></div>

  <!-- SCORECARD -->
  <div class="scorecard" id="scoreCard">
    <div class="sc-card">
      <span class="sc-eyebrow">Assessment Result</span>

      <div class="sc-ring-wrap">
        <div class="sc-ring-container">
          <svg class="sc-ring-svg sc-ring-svg-el" width="170" height="170" viewBox="0 0 170 170">
            <defs>
              <linearGradient id="ringGradA" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#10B981"/></linearGradient>
              <linearGradient id="ringGradB" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D4D4D8"/><stop offset="100%" stop-color="#A1A1AA"/></linearGradient>
              <linearGradient id="ringGradC" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFD60A"/><stop offset="100%" stop-color="#FF9F0A"/></linearGradient>
              <linearGradient id="ringGradD" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#FF453A"/></linearGradient>
            </defs>
            <circle class="sc-ring-track" cx="85" cy="85" r="72"/>
            <circle class="sc-ring-fill" id="ringFg" cx="85" cy="85" r="72" stroke-dasharray="452.4" stroke-dashoffset="452.4" stroke="url(#ringGradD)"/>
          </svg>
          <div class="sc-ring-center">
            <span class="sc-pct" id="ringPct">0%</span>
            <span class="sc-pct-lbl">Score</span>
          </div>
        </div>
      </div>

      <div class="sc-grade-wrap">
        <div class="sc-grade"><span class="sc-grade-dot" id="scGradeDot" style="background:#FF453A"></span><span id="scGradeText">Grade D · 0%</span></div>
      </div>

      <div class="sc-title" id="scTitle">—</div>
      <div class="sc-sub" id="scSub"></div>

      <div class="sc-time">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.2" opacity=".4"/><path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity=".4"/></svg>
        <span id="scTimeVal">—</span>
      </div>

      <div class="sc-divider"></div>

      <div class="sc-stats">
        <div class="sc-stat"><div class="sc-stat-num g" id="fC">0</div><div class="sc-stat-lbl">Correct</div></div>
        <div class="sc-stat"><div class="sc-stat-num r" id="fW">0</div><div class="sc-stat-lbl">Wrong</div></div>
        <div class="sc-stat"><div class="sc-stat-num a" id="fS">0</div><div class="sc-stat-lbl">Skipped</div></div>
        <div class="sc-stat"><div class="sc-stat-num w" id="fM">0</div><div class="sc-stat-lbl">Marks</div></div>
      </div>

      <button class="sc-btn-primary" onclick="resetQuiz()">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 2.5 10.5 5 8 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Retake Quiz
      </button>
      <button class="sc-btn-secondary" onclick="shareScore()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" opacity=".85"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Share via WhatsApp
      </button>
      <a href="index.html" class="sc-btn-ghost" id="allTopicsLink">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        All Topics
      </a>
    </div>
  </div>

  <div id="qContainer"></div>
</main>

<!-- FLOATING ISLAND -->
<div class="bottombar" id="bottomIsland">
  <div class="botinner">
    <button class="botback" onclick="goToPage(currentPage-1)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <span class="botcounter" id="hSub">1/12</span>
    <button class="botnext" id="botNextBtn" onclick="handleNext()">
      <span id="botNextLabel">Continue</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>
</div>

<div class="exit-overlay" id="exitOverlay">
  <div class="exit-box">
    <div class="exit-title">End Session?</div>
    <div class="exit-desc">Progress will not be saved.<br>Answered <strong id="exitCount">0</strong> of <strong id="exitTotal">50</strong>.</div>
    <div class="exit-btns">
      <button class="exit-btn exit-leave" onclick="confirmExit()">Leave</button>
      <button class="exit-btn exit-stay" onclick="closeExitModal()">Resume</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
